<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OpInfo News</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body { font-family: Arial; background:#f1f5f9; padding:15px;}

input { padding:10px; margin:5px; width:250px; }

button { padding:10px; margin:5px; }

.item { background:white; padding:10px; margin:5px; border-radius:8px;}

.item.negativa { border-left:5px solid red; background:#ffe5e5;}
.item.social { border-left:5px solid purple; background:#f3e8ff;}

#loginScreen {
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
</style>
</head>

<body>

<div id="loginScreen">
<h2>Acesso ao Sistema</h2>

<input id="nome" placeholder="Nome"><br>
<input id="telefone" placeholder="Telefone"><br>
<input id="email" placeholder="Email"><br>

<button onclick="liberarAcesso()">Entrar</button>
</div>

<h2>🔥 OpInfo News</h2>

<input id="alvo" placeholder="Digite o alvo">
<button onclick="iniciarSistema()">Iniciar</button>

<div id="list"></div>

<script>

// 🔑 CONFIGURE AQUI
const EMAIL_AUTORIZADO = "segurologin@gmail.com";

// EMAILJS CONFIG
emailjs.init("SUA_PUBLIC_KEY");

let noticiasVistas = new Set();

window.onload = () => {
    if(localStorage.getItem("usuario")){
        document.getElementById("loginScreen").style.display = "none";
    }
};

function enviarEmail(nome, telefone, email){
    emailjs.send("SEU_SERVICE_ID","SEU_TEMPLATE_ID",{
        nome: nome,
        telefone: telefone,
        email: email,
        data: new Date().toLocaleString()
    });
}

function liberarAcesso(){
    const nome = document.getElementById("nome").value;
    const telefone = document.getElementById("telefone").value;
    const email = document.getElementById("email").value;

    if(!nome || !telefone || !email){
        alert("Preencha tudo");
        return;
    }

    if(email !== EMAIL_AUTORIZADO){
        alert("Não autorizado");
        return;
    }

    localStorage.setItem("usuario", JSON.stringify({nome, telefone, email}));

    enviarEmail(nome, telefone, email);

    document.getElementById("loginScreen").style.display = "none";
}

// 🔔 NOTIFICAÇÃO
function notificar(titulo, corpo) {
    if (Notification.permission === "granted") {
        navigator.serviceWorker.getRegistration().then(reg => {
            if(reg){
                reg.showNotification(titulo, {
                    body: corpo
                });
            }
        });
    }
}

async function fetchNoticias(alvo){
    const queries = [
        `"${alvo}"`,
        `"${alvo}" instagram`,
        `"${alvo}" facebook`,
        `"${alvo}" x.com`
    ];

    let resultados = [];

    for(const q of queries){
        const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(
            `https://news.google.com/rss/search?q=${encodeURIComponent(q)}`
        )}`;

        const res = await fetch(url);
        const data = await res.json();
        resultados = resultados.concat(data.items || []);
    }

    return resultados;
}

async function ciclo(){
    const alvo = document.getElementById("alvo").value;
    if(!alvo) return;

    const dados = await fetchNoticias(alvo);

    dados.forEach(item => {
        if(noticiasVistas.has(item.link)) return;

        noticiasVistas.add(item.link);

        const titulo = item.title.toLowerCase();
        const link = item.link.toLowerCase();

        const termosNegativos = ["crime","fraude","preso","corrupção"];
        const termosSociais = ["instagram","facebook","twitter","x.com"];

        const isNegativa = termosNegativos.some(t => titulo.includes(t));
        const isSocial = link.includes("instagram") || link.includes("facebook") || link.includes("x.com");

        let classe = "item";
        if(isNegativa) classe += " negativa";
        else if(isSocial) classe += " social";

        const data = new Date(item.pubDate);

        const div = document.createElement("div");
        div.className = classe;

        div.innerHTML = `
            <a href="${item.link}" target="_blank">${item.title}</a>
            <div>
                📅 ${data.toLocaleDateString()} ⏰ ${data.toLocaleTimeString()}
            </div>
        `;

        document.getElementById("list").prepend(div);

        if(isNegativa) notificar("🚨 RISCO", item.title);
        else if(isSocial) notificar("📱 SOCIAL", item.title);
        else notificar("📰 NOTÍCIA", item.title);
    });
}

function iniciarSistema(){
    Notification.requestPermission();
    ciclo();
    setInterval(ciclo, 60000);
}

// PWA
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
