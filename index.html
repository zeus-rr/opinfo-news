<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OpInfo News</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f1f5f9; padding:15px;}
button { padding:10px; margin:5px;}
.item { background:white; padding:10px; margin:5px; border-radius:8px;}
</style>
</head>

<body>

<h2>🔥 OpInfo News</h2>

<input id="alvo" placeholder="Digite o alvo">
<button onclick="iniciarSistema()">Iniciar</button>

<div id="list"></div>

<script>
let noticiasVistas = new Set();
const som = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

async function pedirPermissao() {
    if ("Notification" in window) {
        await Notification.requestPermission();
    }
}

function notificar(titulo, corpo) {
    if (Notification.permission === "granted") {
        navigator.serviceWorker.getRegistration().then(reg => {
            if(reg){
                reg.showNotification(titulo, {
                    body: corpo,
                    icon: "https://zeus-rr.github.io/osint/simbolo.ico"
                });
            }
        });
    }
}

async function fetchNoticias(alvo){
    const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(
        `https://news.google.com/rss/search?q=${encodeURIComponent(alvo)}&hl=pt-BR&gl=BR&ceid=BR:pt`
    )}`;

    const res = await fetch(url);
    const data = await res.json();
    return data.items || [];
}

async function ciclo(){
    const alvo = document.getElementById("alvo").value;
    if(!alvo) return;

    const dados = await fetchNoticias(alvo);

    dados.forEach(item => {
        if(noticiasVistas.has(item.link)) return;

        noticiasVistas.add(item.link);

        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<a href="${item.link}" target="_blank">${item.title}</a>`;
        document.getElementById("list").prepend(div);

        som.play().catch(()=>{});

        notificar("🚨 Nova notícia", item.title);
    });
}

function iniciarSistema(){
    pedirPermissao();
    ciclo();
    setInterval(ciclo, 60000);
}

/* INSTALL BUTTON */
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;

    const btn = document.createElement("button");
    btn.innerText = "📲 Instalar App";

    btn.onclick = async () => {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
    };

    document.body.appendChild(btn);
});

/* SERVICE WORKER */
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
