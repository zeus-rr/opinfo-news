<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OpInfo News</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<style>
body { font-family: Arial; background:#f1f5f9; padding:15px;}

input { padding:10px; margin:5px; width:250px; }

button { padding:10px; margin:5px; }

.item {
    background:white;
    padding:10px;
    margin:5px;
    border-radius:8px;
}

.item.negativa {
    border-left: 5px solid #dc2626;
    background: #ffe5e5;
}

#loginScreen {
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
</style>
</head>

<body>

<div id="loginScreen">
    <h2>Acesso ao Sistema</h2>

    <input id="nome" placeholder="Seu nome"><br>
    <input id="telefone" placeholder="Telefone"><br>
    <input id="email" placeholder="Email"><br>

    <button onclick="liberarAcesso()">Entrar</button>
</div>

<h2>🔥 OpInfo News</h2>

<input id="alvo" placeholder="Digite o alvo">
<button onclick="iniciarSistema()">Iniciar</button>

<div id="list"></div>

<script>

const EMAIL_AUTORIZADO = "segurologin@gmail.com";

let noticiasVistas = new Set();
const som = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

/* ================= LOGIN ================= */
window.onload = () => {
    const user = localStorage.getItem("usuario");
    if(user){
        document.getElementById("loginScreen").style.display = "none";
    }
};

function liberarAcesso(){
    const nome = document.getElementById("nome").value;
    const telefone = document.getElementById("telefone").value;
    const email = document.getElementById("email").value;

    if(!nome || !telefone || !email){
        alert("Preencha todos os campos");
        return;
    }

    if(email !== EMAIL_AUTORIZADO){
        alert("Acesso não autorizado");
        return;
    }

    localStorage.setItem("usuario", JSON.stringify({nome, telefone, email}));
    document.getElementById("loginScreen").style.display = "none";
}

/* ================= NOTIFICAÇÃO ================= */
async function pedirPermissao() {
    if ("Notification" in window) {
        await Notification.requestPermission();
    }
}

function notificar(titulo, corpo) {
    if (Notification.permission === "granted") {
        navigator.serviceWorker.getRegistration().then(reg => {
            if(reg){
                reg.showNotification(titulo, {
                    body: corpo,
                    icon: "https://zeus-rr.github.io/osint/simbolo.ico"
                });
            }
        });
    }
}

/* ================= NOTÍCIAS ================= */
async function fetchNoticias(alvo){
    const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(
        `https://news.google.com/rss/search?q=${encodeURIComponent(alvo)}&hl=pt-BR&gl=BR&ceid=BR:pt`
    )}`;

    const res = await fetch(url);
    const data = await res.json();
    return data.items || [];
}

/* ================= REDES SOCIAIS ================= */
function gerarLinksSociais(alvo){
    return [
        {
            titulo: `📸 Instagram: ${alvo}`,
            link: `https://www.instagram.com/explore/tags/${alvo.replace(/\s+/g, "")}/`
        },
        {
            titulo: `📘 Facebook: ${alvo}`,
            link: `https://www.facebook.com/search/top?q=${encodeURIComponent(alvo)}`
        },
        {
            titulo: `🐦 X (Twitter): ${alvo}`,
            link: `https://x.com/search?q=${encodeURIComponent(alvo)}&src=typed_query`
        }
    ];
}

/* ================= ANÁLISE NEGATIVA ================= */
function ehNegativa(texto){
    const termos = [
        "processo", "crime", "fraude", "negativa", "justiça", "investigação", "mentira", "homofobia", "feminicidio", "homicidio", "preconceito", "acusação", "preso", "irregular", "denúncia", "polícia", "réu", "corrupção", "bloqueio", "cpi", "stf", "escândalo"
    ];

    texto = texto.toLowerCase();
    return termos.some(t => texto.includes(t));
}

/* ================= RENDER ================= */
function renderItem(titulo, link, dataISO, isNegativa){
    const div = document.createElement("div");
    div.className = "item " + (isNegativa ? "negativa" : "");

    const dataFormatada = new Date(dataISO).toLocaleString("pt-BR", {
        timeZone: "America/Sao_Paulo"
    });

    div.innerHTML = `
        <a href="${link}" target="_blank">${titulo}</a>
        <div style="font-size:12px; color:#555;">
            ⏰ ${dataFormatada}
        </div>
    `;

    document.getElementById("list").prepend(div);

    som.play().catch(()=>{});

    if(isNegativa){
        notificar("🚨 ALERTA NEGATIVO", titulo);
    } else {
        notificar("📰 Nova informação", titulo);
    }
}

/* ================= LOOP PRINCIPAL ================= */
async function ciclo(){
    const alvo = document.getElementById("alvo").value;
    if(!alvo) return;

    const noticias = await fetchNoticias(alvo);

    noticias.forEach(item => {
        if(noticiasVistas.has(item.link)) return;

        noticiasVistas.add(item.link);

        renderItem(
            item.title,
            item.link,
            item.pubDate,
            ehNegativa(item.title)
        );
    });

    /* Redes sociais - mostra só uma vez */
    if(!noticiasVistas.has("SOCIAL_"+alvo)){
        noticiasVistas.add("SOCIAL_"+alvo);

        const sociais = gerarLinksSociais(alvo);

        sociais.forEach(s => {
            renderItem(
                s.titulo,
                s.link,
                new Date(),
                false
            );
        });
    }
}

/* ================= START ================= */
function iniciarSistema(){
    pedirPermissao();
    ciclo();
    setInterval(ciclo, 60000);
}

/* ================= INSTALAR APP ================= */
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;

    const btn = document.createElement("button");
    btn.innerText = "📲 Instalar App";

    btn.onclick = async () => {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
    };

    document.body.appendChild(btn);
});

/* ================= SERVICE WORKER ================= */
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
