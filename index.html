<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OpInfo News</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<style>
body { font-family: Arial; background:#f1f5f9; padding:15px;}

input { padding:10px; margin:5px; width:250px; }

button { padding:10px; margin:5px; }

.item {
    background:white;
    padding:10px;
    margin:5px;
    border-radius:8px;
}

.item.negativa {
    border-left:5px solid red;
    background:#ffe5e5;
}

.item.social {
    border-left:5px solid purple;
    background:#f3e8ff;
}

/* LOGIN */
#loginScreen {
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

/* BOTÃO INSTALAR */
#installBtn {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#2563eb;
    color:white;
    border:none;
    padding:14px 18px;
    border-radius:50px;
    font-weight:bold;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
    cursor:pointer;
    display:none;
    z-index:999;
}

#installBtn:hover {
    transform:scale(1.05);
}
</style>
</head>

<body>

<div id="loginScreen">
<h2>Acesso ao Sistema</h2>

<input id="nome" placeholder="Nome"><br>
<input id="telefone" placeholder="Telefone"><br>
<input id="email" placeholder="Email"><br>

<button onclick="liberarAcesso()">Entrar</button>
</div>

<h2>🔥 OpInfo News</h2>

<input id="alvo" placeholder="Digite o alvo">
<button onclick="iniciarSistema()">Iniciar</button>

<div id="list"></div>

<!-- BOTÃO FIXO -->
<button id="installBtn">📲 Instalar</button>

<script>

const EMAIL_AUTORIZADO = "segurologin@gmail.com";

let noticiasVistas = new Set();
let deferredPrompt;

// manter login
window.onload = () => {
    if(localStorage.getItem("usuario")){
        document.getElementById("loginScreen").style.display = "none";
    }
};

// login
function liberarAcesso(){
    const nome = document.getElementById("nome").value;
    const telefone = document.getElementById("telefone").value;
    const email = document.getElementById("email").value;

    if(!nome || !telefone || !email){
        alert("Preencha todos os campos");
        return;
    }

    if(email !== EMAIL_AUTORIZADO){
        alert("Acesso não autorizado");
        return;
    }

    localStorage.setItem("usuario", JSON.stringify({nome, telefone, email}));

    document.getElementById("loginScreen").style.display = "none";
}

// PWA INSTALL
window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;

    const btn = document.getElementById("installBtn");
    btn.style.display = "block";
});

document.getElementById("installBtn").onclick = async () => {
    if(!deferredPrompt) return;

    deferredPrompt.prompt();
    await deferredPrompt.userChoice;

    deferredPrompt = null;
    document.getElementById("installBtn").style.display = "none";
};

// NOTIFICAÇÃO
function notificar(titulo, corpo) {
    if (Notification.permission === "granted") {
        navigator.serviceWorker.getRegistration().then(reg => {
            if(reg){
                reg.showNotification(titulo, { body: corpo });
            }
        });
    }
}

// BUSCA
async function fetchNoticias(alvo){
    const queries = [
        `"${alvo}"`,
        `"${alvo}" instagram`,
        `"${alvo}" facebook`,
        `"${alvo}" x.com`
    ];

    let resultados = [];

    for(const q of queries){
        const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(
            `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=pt-BR&gl=BR&ceid=BR:pt`
        )}`;

        const res = await fetch(url);
        const data = await res.json();
        resultados = resultados.concat(data.items || []);
    }

    return resultados;
}

// PROCESSAMENTO
async function ciclo(){
    const alvo = document.getElementById("alvo").value;
    if(!alvo) return;

    const dados = await fetchNoticias(alvo);

    dados.forEach(item => {
        if(noticiasVistas.has(item.link)) return;

        noticiasVistas.add(item.link);

        const titulo = item.title.toLowerCase();
        const link = item.link.toLowerCase();

        const termosNegativos = [
            "crime","fraude","preso","corrupção","denúncia"
        ];

        const isNegativa = termosNegativos.some(t => titulo.includes(t));

        const isSocial =
            link.includes("instagram") ||
            link.includes("facebook") ||
            link.includes("x.com");

        let classe = "item";
        if(isNegativa) classe += " negativa";
        else if(isSocial) classe += " social";

        const data = new Date(item.pubDate);

        const div = document.createElement("div");
        div.className = classe;

        div.innerHTML = `
            <a href="${item.link}" target="_blank">${item.title}</a>
            <div style="font-size:12px;">
                📅 ${data.toLocaleDateString('pt-BR')}
                ⏰ ${data.toLocaleTimeString('pt-BR')}
            </div>
        `;

        document.getElementById("list").prepend(div);

        if(isNegativa){
            notificar("🚨 RISCO", item.title);
        } else if(isSocial){
            notificar("📱 SOCIAL", item.title);
        } else {
            notificar("📰 NOTÍCIA", item.title);
        }
    });
}

// START
function iniciarSistema(){
    Notification.requestPermission();
    ciclo();
    setInterval(ciclo, 60000);
}

// SERVICE WORKER
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
